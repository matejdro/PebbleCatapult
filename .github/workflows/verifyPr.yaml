name: pull-request-build
run-name: "#${{ github.event.pull_request.number}} ${{ github.event.pull_request.title}}"
on:
  pull_request:
    types: [ 'opened', 'reopened', 'synchronize' ]
jobs:
  build-app:
    runs-on: "ubuntu-latest"
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      # Preparation

      - name: Install screenshot test dependencies
        run: "sudo apt-get install -y libfreetype6 fontconfig fonts-dejavu"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install pebble SDK
        run: "uv tool install pebble-tool && pebble sdk install latest"
      - name: Globally enable build cache and parallel execution
        run: |
          mkdir -p ~/.gradle
          
          cat >> ~/.gradle/gradle.properties<< EOF
          org.gradle.caching=true
          org.gradle.parallel=true
          EOF
      - name: Force all tasks to be rerun when debug mode is on
        # This allows us to force rerun the build if cache has gotten corrupted
        run: 'if [[ "${{ runner.debug }}" == "1" ]]; then
                  echo "GLOBAL_FLAGS= --rerun-tasks" >> "$GITHUB_ENV";
              else
                  echo "GLOBAL_FLAGS=" >> "$GITHUB_ENV";
              fi
            '
      - uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle
      - uses: android-actions/setup-android@7c5672355aaa8fde5f97a91aa9a99616d1ace6bc
      - run: sdkmanager "platforms;android-33" "platforms;android-34"
      - name: Enable Gradle remote build cache
        uses: burrunan/gradle-cache-action@663fbad34e03c8f12b27f4999ac46e3d90f87eca
        with:
          debug: false
          concurrent: true
          read-only: true

      # Build mobile app

      - name: Compile app
        run: "compileReleaseKotlin assembleDebug"

      # Tests

      - name: Compile Unit Tests
        run: "compileDebugUnitTestSources compileReleaseUnitTestSources"
      - name: Lint
        run: "lintRelease runDebugDetekt assertModuleGraph buildHealth detectTooManyFiles verifyDebugDatabaseMigration reportMerge --continue"
      - name: Double check DB with the generated schema
        run: "generateDebugDatabaseSchema verifyDebugDatabaseMigration --continue"
      - name: Run Unit Tests
        run: "runDebugTests -x :app-screenshot-tests:testDebugUnitTest --continue"
      - name: "Generate new Screenshot Tests"
        run: "config/generate-screenshots.sh ${{ github.event.pull_request.head.ref }}"
        working-directory: mobile
      - name: "Run Screenshot Tests"
        run: "--continue verifyPaparazziDebug"
      - name: "Create jacoco aggregate"
        run: "aggregatedJacocoReport"

      # Build watchapp

      - name: Build watchapp
        run: pebble build && mv build/watch.pbw build/catapult-watchapp.pbw
        working-directory: watch

      - name: "Create jacoco aggregate"
        run: "./gradlew aggregatedJacocoReport"
        #     GitHub Actions does not allow PR actions triggered from external contributors
        #     to post comments. As a workaround, we upload metadata artifacts
        #     and then sarif-comment.yaml workflow will run, which will post the comment

      - run: echo ${{ github.event.number }} > pr_number.txt
        if: (!cancelled())
      - name: Upload Results
        if: (!cancelled())
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f #v6
        with:
          name: results
          path: |
            **/build/outputs/*-results/**/*.xml
            **/build/*-results/**/*.xml
            pr_number.txt
            ${{ github.event_path }}
            merge.sarif
            build/reports/jacoco/aggregatedJacocoReport/aggregatedJacocoReport.xml
      - name: "Upload Screenshot test failures"
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f #v6
        if: failure()
        with:
          name: failed-screenshot-tests
          path: app-screenshot-tests/build/paparazzi/failures
